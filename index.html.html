<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prezent 🎁 BOSS CINEMATIC MODE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:#f5f5f5;
    overflow:hidden;
    background:#000;
}

#flash{
    position:fixed;
    width:100%;height:100%;
    background:white;
    z-index:99999;
    animation:flash 1.2s forwards;
}
@keyframes flash{
    0%{opacity:1}
    100%{opacity:0;visibility:hidden}
}

.star{
    position:fixed;
    width:2px;height:2px;
    background:white;
    opacity:0.5;
    animation:twinkle 3s infinite;
}
@keyframes twinkle{
    0%,100%{opacity:0.2}
    50%{opacity:1}
}

body::before{
    content:"";
    position:fixed;
    width:100%;height:100%;
    background:black;
    animation:fadeOut 2s forwards;
    z-index:9998;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

#lock{
    position:fixed;
    width:100%;height:100%;
    background:radial-gradient(circle at top,#0b0b0b,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    text-align:center;
    padding:20px;
}

.glitch{
    font-size:28px;
    color:gold;
    animation:glitch 1.2s infinite;
}
@keyframes glitch{
    0%{transform:translate(0)}
    25%{transform:translate(-2px,1px)}
    50%{transform:translate(2px,-1px)}
    75%{transform:translate(-1px,-2px)}
    100%{transform:translate(0)}
}

input{
    padding:12px;
    border-radius:10px;
    border:none;
    margin-top:10px;
    text-align:center;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:gold;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}
button:hover{transform:scale(1.05)}

#envelope{
    position:fixed;
    width:120px;
    height:80px;
    background:gold;
    border-radius:10px;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    animation:float 2s infinite ease-in-out;
}
@keyframes float{
    0%,100%{transform:translate(-50%,-50%) translateY(0)}
    50%{transform:translate(-50%,-50%) translateY(-10px)}
}

#bg{
    position:fixed;
    width:100%;height:100%;
    top:0;left:0;
    z-index:-3;
}
#bg img{
    position:absolute;
    width:100%;height:100%;
    object-fit:cover;
    opacity:0;
    transition:2s;
    filter:brightness(0.35);
}

.screen{
    position:absolute;
    width:100%;height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}
.hidden{display:none;}

.card{
    max-width:520px;
    padding:25px;
    border-radius:15px;
    background:rgba(0,0,0,0.65);
    border:1px solid rgba(255,215,0,0.4);
    box-shadow:0 0 50px rgba(255,215,0,0.2);
    animation:pop 0.8s ease;
}
@keyframes pop{
    from{opacity:0;transform:scale(0.9)}
    to{opacity:1;transform:scale(1)}
}

h1,h2{color:gold;}
p{color:#ddd;line-height:1.6;}

.plane{
    position:fixed;
    font-size:45px;
    left:-10%;
    top:20%;
    animation:fly 3s ease-out forwards;
    z-index:1;
}
@keyframes fly{
    0%{transform:translateX(0);opacity:0}
    10%{opacity:1}
    100%{transform:translateX(120vw) translateY(-20vh);opacity:0}
}

.shake{animation:shake 0.3s}
@keyframes shake{
    0%{transform:translate(0)}
    25%{transform:translate(3px,2px)}
    50%{transform:translate(-3px,2px)}
    75%{transform:translate(3px,-2px)}
    100%{transform:translate(0)}
}

.confetti{
    position:fixed;
    width:8px;height:8px;
    top:-10px;
    background:gold;
    animation:fall 3s linear forwards;
}
@keyframes fall{
    to{transform:translateY(120vh) rotate(360deg)}
}
</style>
</head>

<body>

<div id="flash"></div>

<div id="lock">
    <div class="glitch">🔐 SYSTEM SZYFRU</div>
    <p id="riddle">Zagadka 1: Co unosi ludzi w niebo?</p>
    <input id="answer" placeholder="Twoja odpowiedź">
    <button onclick="checkRiddle()">Dalej</button>
    <p style="color:#aaa" id="hint">✈️</p>
</div>

<div id="bg">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
    <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e">
</div>

<div id="envelope" onclick="openEnvelope()">✉️</div>

<div id="start" class="screen hidden">
    <div class="card">
        <h1>💌 WIADOMOŚĆ</h1>
        <button onclick="next(1);startBg();plane()">OTWÓRZ</button>
    </div>
</div>

<div id="s1" class="screen hidden"><div class="card"><h2>🎉 18</h2><button onclick="next(2);plane()">DALEJ</button></div></div>
<div id="s2" class="screen hidden"><div class="card"><h2>✈️ START</h2><button onclick="next(3);plane()">DALEJ</button></div></div>

<div id="s3" class="screen hidden">
    <div class="card">
        <h2>🎁 WYJAZD</h2>
        <p style="color:gold;">Wszystkiego najlepszego kochanie ❤️</p>
        <p>
            ✈️ Wyjazd – city break / wycieczka<br>
            🌍 Gdziekolwiek<br><br>
            💼 Jak? Ja będę Twoim biurem podróży, nie martw się ❤️<br><br>
            💛 Kocham Cię
            <br><br>🎉 Wszystkiego najlepszego, kochanie ❤️
        </p>
        <button onclick="celebration();plane()">🎊</button>
    </div>
</div>

<audio id="music" src="muzyka.mp3"></audio>

<script>
let step=1;
const answers=["samolot","mapa","hasło"];
const riddles=["Co unosi ludzi w niebo?","Co pokazuje świat bez ruchu?","Co otwiera prezent?"];
const hints=["✈️","🌍","🔐"];

function checkRiddle(){
    let val=document.getElementById("answer").value.toLowerCase().trim();

    if(val===answers[step-1]){
        step++;
        document.body.classList.add("shake");
        setTimeout(()=>document.body.classList.remove("shake"),300);

        if(step>3){
            document.getElementById("lock").innerHTML=`<h1 class='glitch'>🔓 ODBLOKOWANO</h1><button onclick="unlock()">WEJDŹ</button>`;
        } else {
            document.getElementById("riddle").innerText="Zagadka "+step+": "+riddles[step-1];
            document.getElementById("hint").innerText=hints[step-1];
            document.getElementById("answer").value="";
        }
    } else {
        document.body.classList.add("shake");
        setTimeout(()=>document.body.classList.remove("shake"),300);
    }
}

function unlock(){
    document.getElementById("lock").style.display="none";
    document.getElementById("envelope").style.display="flex";
}

function openEnvelope(){
    document.getElementById("envelope").style.display="none";
    document.getElementById("start").classList.remove("hidden");
}

let bgIndex=0;
function startBg(){
    let imgs=document.querySelectorAll('#bg img');
    setInterval(()=>{
        imgs.forEach(i=>i.style.opacity=0);
        imgs[bgIndex].style.opacity=1;
        bgIndex=(bgIndex+1)%imgs.length;
    },4000);
    imgs[0].style.opacity=1;
}

function next(n){
    document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
    document.getElementById('s'+n).classList.remove('hidden');
}

function plane(){
    let p=document.createElement("div");
    p.className="plane";
    p.innerHTML="✈️";
    p.style.top=Math.random()*60+20+"%";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3000);
}

function celebration(){
    let music=document.getElementById("music");
    music.play().catch(()=>{});
    for(let i=0;i<100;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),4000);
    }
}
</script>

</body>
</html>
